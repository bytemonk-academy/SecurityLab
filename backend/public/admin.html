<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — SQL Injection Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0612;
      --bg-card: rgba(28, 15, 48, 0.75);
      --purple-glow: #8b5cf6;
      --purple-mid: #a78bfa;
      --purple-light: #c4b5fd;
      --accent-cyan: #22d3ee;
      --border-glow: rgba(139, 92, 246, 0.5);
      --text-dim: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg-deep);
      color: var(--purple-light);
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-size: 50px 50px;
      background-image:
        linear-gradient(rgba(139, 92, 246, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
    }
    .orb-1 { width: 350px; height: 350px; background: var(--purple-glow); top: -80px; right: -80px; }
    .orb-2 { width: 280px; height: 280px; background: #6366f1; bottom: -60px; left: -60px; }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--purple-light), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .back {
      color: var(--purple-mid);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(139, 92, 246, 0.4);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .back:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: var(--purple-glow);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.1);
      backdrop-filter: blur(12px);
    }

    .card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--purple-light);
    }

    .flag {
      font-size: 1rem;
      color: var(--accent-cyan);
      padding: 1rem;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      margin-bottom: 1.5rem;
      word-break: break-all;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }
    th { color: var(--text-dim); font-weight: 600; }
    .forbidden { color: #f87171; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <header>
      <span class="logo">PORTAL</span>
      <a href="/dashboard.html" class="back">← DASHBOARD</a>
    </header>

    <div class="card">
      <h1>Admin Panel</h1>
      <div id="content">
        <p class="text-dim">Loading…</p>
      </div>
    </div>
  </div>

  <script>
    fetch('/admin', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        var el = document.getElementById('content');
        if (res.error) {
          el.innerHTML = '<p class="forbidden">' + escapeHtml(res.error) + '</p>';
          return;
        }
        var html = '';
        if (res.flag) html += '<div class="flag">Flag: ' + escapeHtml(res.flag) + '</div>';
        if (res.message) html += '<p class="text-dim" style="margin-bottom:1rem">' + escapeHtml(res.message) + '</p>';
        if (res.users && res.users.length) {
          html += '<table><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th></tr></thead><tbody>';
          res.users.forEach(function(u) {
            html += '<tr><td>' + escapeHtml(String(u.id)) + '</td><td>' + escapeHtml(u.username) + '</td><td>' + escapeHtml(u.email) + '</td><td>' + escapeHtml(u.role) + '</td></tr>';
          });
          html += '</tbody></table>';
        }
        el.innerHTML = html || '<p class="text-dim">No data.</p>';
      })
      .catch(function() {
        document.getElementById('content').innerHTML = '<p class="forbidden">Request failed. Are you logged in?</p>';
      });

    function escapeHtml(s) {
      var div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
